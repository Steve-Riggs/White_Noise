play:
  name: Play white noise
  description: Play a selected white noise sound on a media player.
  fields:
    speaker:
      name: Speaker
      description: Media player to play the sound on.
      required: true
      selector:
        entity:
          domain: media_player
    sound:
      name: Sound
      description: Sound ID from sensor.white_noise_sounds.
      required: true
      selector:
        text:
    duration:
      name: Duration
      description: Optional minutes before playback stops. Omit or set to 0 to keep playing until stopped.
      required: false
      selector:
        number:
          min: 0
          max: 720
          step: 1
          unit_of_measurement: minutes
          mode: box
    volume:
      name: Volume
      description: Optional playback volume percentage. If omitted, the current speaker volume is left unchanged.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

stop:
  name: Stop white noise
  description: Stop playback on a media player.
  fields:
    speaker:
      name: Speaker
      description: Media player to stop.
      required: true
      selector:
        entity:
          domain: media_player

refresh_sounds:
  name: Refresh sounds
  description: Rescan the configured media folder for white noise audio files.
