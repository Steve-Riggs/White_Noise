play:
  name: Play white noise
  description: Play a selected white noise file on a media player for a chosen duration.
  fields:
    speaker:
      name: Speaker
      description: Media player entity to play on. Uses the configured default speaker if omitted.
      required: false
      selector:
        entity:
          domain: media_player
    entity_id:
      name: Speaker entity ID
      description: Alternative speaker field, useful for automations.
      required: false
      selector:
        entity:
          domain: media_player
    sound:
      name: Sound
      description: Sound ID, display name, or filename. Uses the first discovered sound if omitted.
      required: false
      selector:
        text:
    duration:
      name: Duration
      description: Duration in minutes before playback is stopped.
      required: false
      default: 60
      selector:
        number:
          min: 1
          max: 720
          step: 1
          unit_of_measurement: minutes
          mode: box
    volume:
      name: Volume
      description: Optional volume percentage to set before playback.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

stop:
  name: Stop white noise
  description: Stop playback on a media player and cancel any active stop timer for that speaker.
  fields:
    speaker:
      name: Speaker
      description: Media player entity to stop. Uses the configured default speaker if omitted.
      required: false
      selector:
        entity:
          domain: media_player
    entity_id:
      name: Speaker entity ID
      description: Alternative speaker field, useful for automations.
      required: false
      selector:
        entity:
          domain: media_player

refresh_sounds:
  name: Refresh sounds
  description: Re-scan the configured media folder for white noise audio files.
  fields: {}
